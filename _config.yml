title: AgentOps Workshop
description: Production readiness for AI agents with evaluation, gates, observability, and governance.
baseurl: "/agentops-workshop"
url: ""

theme: just-the-docs

plugins:
  - jekyll-seo-tag

search_enabled: true
heading_anchors: true
footer_content: ""

# Exclude preparation/authoring materials from the published site.
# `prep/` holds references, build tools, and intermediate artefacts that
# the workshop attendee or instructor never needs to see.
exclude:
  - prep/
  - .venv/
  - vendor/

callouts:
  planning:
    title: Planning note
    color: yellow
  important:
    title: Important
    color: red
  outcome:
    title: Outcome
    color: green
